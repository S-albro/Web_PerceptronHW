<script>
let weights = Array(16).fill(0);
let bias = 0;

    weights[0] = ?? ;
    weights[1] = ?? ;
    weights[2] = ?? ;
    weights[3] = ?? ;
    weights[4] = ?? ;
    weights[5] = ?? ;
    weights[6] = ?? ;

    weights[11] = ?? ;
    weights[12] = ?? ;
    weights[13] = ?? ;
    weights[14] = ?? ;
    weights[15] = ??;
    
    bias = ?? ;

function activation_function(z) {
    return z >= 0 ? 1 : -1;
}

function getInputs() {
    let inputs = [];
    for (let i = 0; i < 16; i++) {
        let val = document.getElementById("p" + i).value;
        inputs.push(parseInt(val));
    }
    return inputs;
}

function dot(a, b) {
    let sum = 0;
    for (let i = 0; i < a.length; i++) {
        sum += a[i] * b[i];
    }
    return sum;
}

function predict(inputs) {
    let linear_product = dot(inputs, weights) + bias;
    return activation_function(linear_product);
}

// Connect Predict button
document.getElementById("predict").onclick = function() {
    let inputs = getInputs();
    let result = predict(inputs);
    document.getElementById("output").innerText =
        result == 1 ? "Prediction: L" : "Prediction: T";
};
</script>
